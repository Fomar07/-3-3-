<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>СРСП №3 | JavaScript Quiz Lab</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">СРСП №3 · Неделя 9</p>
        <h1>Interactive JavaScript Quiz Lab</h1>
        <p class="hero-text">
          Викторина охватывает типы данных, операторы, циклы, условия, DOM, события, массивы,
          методы <code>map</code>, <code>filter</code>, <code>forEach</code> и базовую отладку.
        </p>
      </div>

      <div class="hero-card">
        <p class="hero-card-label">Формат</p>
        <p class="hero-card-value">16 заданий</p>
      </div>
    </header>

    <main>
      <section class="dashboard">
        <article class="metric">
          <span class="metric-label">Всего вопросов</span>
          <strong id="total-count">16</strong>
        </article>
        <article class="metric">
          <span class="metric-label">Правильных</span>
          <strong id="correct-count">0</strong>
        </article>
        <article class="metric">
          <span class="metric-label">Прогресс</span>
          <strong id="progress-count">0 / 16</strong>
        </article>
      </section>

      <section class="actions">
        <button id="check-btn" class="primary-btn" type="button">Проверить ответы</button>
        <button id="reset-btn" class="ghost-btn" type="button">Начать заново</button>
      </section>

      <section id="quiz-container" class="quiz-grid" aria-live="polite"></section>

      <section id="result-panel" class="result-panel hidden">
        <h2>Результат</h2>
        <p id="result-summary"></p>
        <div id="topic-breakdown" class="topic-breakdown"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
